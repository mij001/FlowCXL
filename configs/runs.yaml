dataset_profiles:
  - PROFILE_TPCH_SF100_MODERATE_INTERMEDIATE
  - PROFILE_TPCH_SF100_HIGH_INTERMEDIATE

size_multipliers:
  - 0.5
  - 1.0
  - 2.0
  - 4.0

tile_size_bytes: 268435456
trace_max_tiles: 512
max_inflight_tiles: 128

scenarios:
  - cpu_only
  - pim_host_bounce
  - pim_flowcxl_direct

link_profile:
  host_h2d_link: UPMEM_HOST_H2D_MEASURED
  host_d2h_link: UPMEM_HOST_D2H_MEASURED
  cxl_direct_link: CXL_LOCAL

resource_capacity:
  host_h2d_ingress_channels: 1
  host_h2d_stage_channels: 1
  host_d2h_channels: 1
  cxl_direct_channels: 1
  host_touch_channels: 1
  cpu_materialize_channels: 1

stage_defaults:
  cpu_units: 32
  cpu_unit_compute_Bps: 1000000000.0
  cpu_unit_power_W: 15.0
  pim_units: 32
  pim_unit_compute_Bps: 1000000000.0
  pim_unit_power_W: 7.5
  host_touch_Bps: 25000000000.0
  host_touch_fixed_s: 0.000002

scenario_stage_device_map_by_template:
  deepvariant_3stage:
    cpu_only: [cpu, cpu, cpu]
    pim_host_bounce: [pim, pim, cpu]
    pim_flowcxl_direct: [pim, pim, cpu]
  tpch_3op:
    cpu_only: [cpu, cpu, cpu]
    pim_host_bounce: [pim, pim, pim]
    pim_flowcxl_direct: [pim, pim, pim]

pim_speedup_vs_cpu_by_stage_by_template:
  deepvariant_3stage:
    make_examples: 1.5
    call_variants: 2.0
    postprocess_variants: 1.0
  tpch_3op:
    scan_filter_project: 2.5
    join: 3.0
    groupby_agg: 2.0

cpu_stage_unit_compute_Bps_by_template:
  deepvariant_3stage:
    make_examples: 1000000000.0
    call_variants: 1000000000.0
    postprocess_variants: 1000000000.0
  tpch_3op:
    scan_filter_project: 1200000000.0
    join: 900000000.0
    groupby_agg: 1500000000.0

enable_memory_ceiling_by_template:
  deepvariant_3stage: false
  tpch_3op: true

dram_service_defaults:
  cacheline_bytes: 64

cpu_mem_Bps_by_stage_by_template:
  deepvariant_3stage:
    make_examples: 120000000000.0
    call_variants: 120000000000.0
    postprocess_variants: 120000000000.0
  tpch_3op:
    scan_filter_project: 120000000000.0
    join: 120000000000.0
    groupby_agg: 120000000000.0

pim_mem_Bps_by_stage_by_template:
  deepvariant_3stage:
    make_examples: 240000000000.0
    call_variants: 240000000000.0
    postprocess_variants: 240000000000.0
  tpch_3op:
    scan_filter_project: 240000000000.0
    join: 240000000000.0
    groupby_agg: 240000000000.0

bytes_touched_factors_by_stage_by_template:
  deepvariant_3stage:
    make_examples:
      input_factor: 1.0
      output_factor: 1.0
      amplification_factor: 1.0
    call_variants:
      input_factor: 1.0
      output_factor: 1.0
      amplification_factor: 1.0
    postprocess_variants:
      input_factor: 1.0
      output_factor: 1.0
      amplification_factor: 1.0
  tpch_3op:
    scan_filter_project:
      input_factor: 4.5
      output_factor: 1.0
      amplification_factor: 1.0
    join:
      input_factor: 1.0
      output_factor: 1.0
      amplification_factor: 1.6
    groupby_agg:
      input_factor: 1.0
      output_factor: 1.0
      amplification_factor: 1.0

cpu_random_access_penalty_by_stage_by_template:
  deepvariant_3stage:
    make_examples: 1.0
    call_variants: 1.0
    postprocess_variants: 1.0
  tpch_3op:
    scan_filter_project: 1.0
    join: 3.0
    groupby_agg: 2.0

cpu_access_pattern_by_stage_by_template:
  deepvariant_3stage:
    make_examples:
      access_pattern: sequential_scan
      row_hit_rate: 0.90
      mlp: 32
      avg_miss_latency_ns: 100.0
    call_variants:
      access_pattern: sequential_scan
      row_hit_rate: 0.90
      mlp: 32
      avg_miss_latency_ns: 100.0
    postprocess_variants:
      access_pattern: sequential_scan
      row_hit_rate: 0.90
      mlp: 32
      avg_miss_latency_ns: 100.0
  tpch_3op:
    scan_filter_project:
      access_pattern: sequential_scan
      row_hit_rate: 0.92
      mlp: 32
      avg_miss_latency_ns: 95.0
    join:
      access_pattern: hash_probe
      row_hit_rate: 0.18
      mlp: 8
      avg_miss_latency_ns: 130.0
    groupby_agg:
      access_pattern: groupby_update
      row_hit_rate: 0.28
      mlp: 10
      avg_miss_latency_ns: 125.0

cpu_materialization_by_template:
  deepvariant_3stage:
    enabled: false
    scenarios: []
    breaker_boundaries: []
    materialize_Bps: 80000000000.0
    fixed_s: 0.000002
  tpch_3op:
    enabled: true
    scenarios: [cpu_only]
    breaker_boundaries: [1, 2]
    materialize_Bps: 80000000000.0
    fixed_s: 0.000002

transfer_power_W:
  host_h2d_ingress_channel: 20.0
  host_h2d_stage_channel: 20.0
  host_d2h_channel: 20.0
  cxl_direct_channel: 16.0
  host_touch_channel: 30.0
  cpu_materialize_channel: 22.0

stage_overrides: {}
