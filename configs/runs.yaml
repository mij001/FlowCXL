dataset_profiles:
  - PROFILE_TPCH_SF100_MODERATE_INTERMEDIATE
  - PROFILE_TPCH_SF100_HIGH_INTERMEDIATE
  - PROFILE_DV_ILLUMINA_WGS_30X
  - PROFILE_DV_ILLUMINA_WES_100X

workload_sweep:
  tpch_profiles:
    - PROFILE_TPCH_SF100_MODERATE_INTERMEDIATE
    - PROFILE_TPCH_SF100_HIGH_INTERMEDIATE
  deepvariant_profiles:
    - PROFILE_DV_ILLUMINA_WGS_30X
    - PROFILE_DV_ILLUMINA_WES_100X

workload_variants:
  - name: base
    overrides: {}
  - name: ingressless
    overrides:
      ingress_resident_scenarios_by_template:
        deepvariant_3stage: [pim_host_bounce, pim_flowcxl_direct]
        tpch_3op: [pim_host_bounce, pim_flowcxl_direct]
  - name: retention_colocated
    overrides:
      scenario_stage_endpoint_map_by_template:
        deepvariant_3stage:
          pim_host_bounce: [pim0, pim0, cpu0]
          pim_flowcxl_direct: [pim0, pim0, cpu0]
        tpch_3op:
          pim_host_bounce: [pim0, pim0, pim0]
          pim_flowcxl_direct: [pim0, pim0, pim0]
      pim_retention:
        pim_retention_capacity_bytes: 1099511627776
  - name: switch_striping
    overrides:
      link_profile:
        cxl_direct_link: CXL_SWITCH
      cxl_topology:
        enabled: true
        mode: dynamic_striping
        max_stripes: 4
        num_physical_links: 4
        applies_to_links: [CXL_SWITCH]
      resource_capacity:
        cxl_direct_channels: 2
      scenario_stage_endpoint_map_by_template:
        deepvariant_3stage:
          pim_host_bounce: [pim0, pim1, cpu0]
          pim_flowcxl_direct: [pim0, pim1, cpu0]
        tpch_3op:
          pim_host_bounce: [pim0, pim1, pim2]
          pim_flowcxl_direct: [pim0, pim1, pim2]

size_multipliers:
  - 0.5
  - 1.0
  - 2.0
  - 4.0

tile_size_bytes: 268435456
trace_max_tiles: 512
max_inflight_tiles: 128

scenarios:
  - cpu_only
  - pim_host_bounce
  - pim_flowcxl_direct

link_profile:
  host_h2d_link: UPMEM_HOST_H2D_MEASURED
  host_d2h_link: UPMEM_HOST_D2H_MEASURED
  cxl_direct_link: CXL_LOCAL

default_pim_endpoint_policy: colocate

scenario_stage_endpoint_map_by_template:
  deepvariant_3stage:
    cpu_only: [cpu0, cpu0, cpu0]
    pim_host_bounce: [pim0, pim1, cpu0]
    pim_flowcxl_direct: [pim0, pim1, cpu0]
  tpch_3op:
    cpu_only: [cpu0, cpu0, cpu0]
    pim_host_bounce: [pim0, pim1, pim2]
    pim_flowcxl_direct: [pim0, pim1, pim2]

ingress_resident_scenarios_by_template:
  deepvariant_3stage: []
  tpch_3op: []

pim_retention:
  enabled: true
  applies_to_scenarios: [pim_flowcxl_direct, pim_host_bounce]
  same_endpoint_short_circuit: true
  retain_fixed_s: 0.0000003
  retain_metadata_bytes: 4096
  retain_local_BW_Bps: 200000000000.0
  pim_retention_capacity_bytes: 34359738368
  overflow_policy: fallback_transfer

cxl_direct_concurrency:
  virtual_channels_per_channel: 4
  dma_outstanding_per_vc: 16
  full_bw_outstanding_threshold: 8
  dma_issue_fixed_s: 0.0000002

cxl_topology:
  enabled: true
  mode: dynamic_striping
  max_stripes: 4
  num_physical_links: 4
  applies_to_links: [CXL_SWITCH]

resource_capacity:
  host_h2d_ingress_channels: 1
  host_h2d_stage_channels: 1
  host_d2h_channels: 1
  cxl_direct_channels: 1
  host_touch_channels: 1
  cpu_materialize_channels: 1

stage_defaults:
  cpu_units: 32
  cpu_unit_compute_Bps: 1000000000.0
  cpu_unit_power_W: 15.0
  pim_units: 32
  pim_unit_compute_Bps: 1000000000.0
  pim_unit_power_W: 7.5
  host_touch_Bps: 25000000000.0
  host_touch_fixed_s: 0.000002

scenario_stage_device_map_by_template:
  deepvariant_3stage:
    cpu_only: [cpu, cpu, cpu]
    pim_host_bounce: [pim, pim, cpu]
    pim_flowcxl_direct: [pim, pim, cpu]
  tpch_3op:
    cpu_only: [cpu, cpu, cpu]
    pim_host_bounce: [pim, pim, pim]
    pim_flowcxl_direct: [pim, pim, pim]

pim_speedup_vs_cpu_by_stage_by_template:
  deepvariant_3stage:
    make_examples: 1.5
    call_variants: 2.0
    postprocess_variants: 1.0
  tpch_3op:
    scan_filter_project: 2.5
    join: 3.0
    groupby_agg: 2.0

cpu_stage_unit_compute_Bps_by_template:
  deepvariant_3stage:
