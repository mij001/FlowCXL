dataset_profiles:
  - PROFILE_TPCH_SF100_MODERATE_INTERMEDIATE
  - PROFILE_TPCH_SF100_HIGH_INTERMEDIATE
  - PROFILE_DV_ILLUMINA_WGS_30X
  - PROFILE_DV_ILLUMINA_WES_100X

workload_sweep:
  tpch_profiles:
    - PROFILE_TPCH_SF100_MODERATE_INTERMEDIATE
    - PROFILE_TPCH_SF100_HIGH_INTERMEDIATE
  deepvariant_profiles:
    - PROFILE_DV_ILLUMINA_WGS_30X
    - PROFILE_DV_ILLUMINA_WES_100X

workload_variants:
  - name: base
    overrides: {}
  - name: ingressless
    overrides:
      ingress_resident_scenarios_by_template:
        deepvariant_3stage: [pim_host_bounce, pim_flowcxl_direct]
        tpch_3op: [pim_host_bounce, pim_flowcxl_direct]
  - name: retention_colocated
    overrides:
      scenario_stage_endpoint_map_by_template:
        deepvariant_3stage:
          pim_host_bounce: [cpu0, pim0, pim0, pim0, cpu0]
          pim_flowcxl_direct: [cpu0, pim0, pim0, pim0, cpu0]
        tpch_3op:
          pim_host_bounce: [pim0, pim0, pim0]
          pim_flowcxl_direct: [pim0, pim0, pim0]
      pim_retention:
        pim_retention_capacity_bytes: 1099511627776
  - name: switch_striping
    overrides:
      link_profile:
        cxl_direct_link: CXL_SWITCH
      cxl_topology:
        enabled: true
        mode: dynamic_striping
        max_stripes: 4
        num_physical_links: 4
        applies_to_links: [CXL_SWITCH]
      resource_capacity:
        cxl_direct_channels: 2
      scenario_stage_endpoint_map_by_template:
        deepvariant_3stage:
          pim_host_bounce: [cpu0, pim0, pim1, pim2, cpu0]
          pim_flowcxl_direct: [cpu0, pim0, pim1, pim2, cpu0]
        tpch_3op:
          pim_host_bounce: [pim0, pim1, pim2]
          pim_flowcxl_direct: [pim0, pim1, pim2]

size_multipliers:
  - 0.5
  - 1.0
  - 2.0
  - 4.0

tile_size_bytes: 268435456
trace_max_tiles: 512
max_inflight_tiles: 128

scenarios:
  - cpu_only
  - pim_host_bounce
  - pim_flowcxl_direct

link_profile:
  host_h2d_link: UPMEM_HOST_H2D_MEASURED
  host_d2h_link: UPMEM_HOST_D2H_MEASURED
  cxl_direct_link: CXL_LOCAL

default_pim_endpoint_policy: colocate

scenario_stage_endpoint_map_by_template:
  deepvariant_3stage:
    cpu_only: [cpu0, cpu0, cpu0, cpu0, cpu0]
    pim_host_bounce: [cpu0, pim0, pim1, pim2, cpu0]
    pim_flowcxl_direct: [cpu0, pim0, pim1, pim2, cpu0]
  tpch_3op:
    cpu_only: [cpu0, cpu0, cpu0]
    pim_host_bounce: [pim0, pim1, pim2]
    pim_flowcxl_direct: [pim0, pim1, pim2]

ingress_resident_scenarios_by_template:
  deepvariant_3stage: []
  tpch_3op: []

pim_retention:
  enabled: true
  applies_to_scenarios: [pim_flowcxl_direct, pim_host_bounce]
  same_endpoint_short_circuit: true
  retain_fixed_s: 0.0000003
  retain_metadata_bytes: 4096
  retain_local_BW_Bps: 200000000000.0
  pim_retention_capacity_bytes: 34359738368
  overflow_policy: fallback_transfer

cxl_direct_concurrency:
  virtual_channels_per_channel: 4
  dma_outstanding_per_vc: 16
  full_bw_outstanding_threshold: 8
  dma_issue_fixed_s: 0.0000002

cxl_topology:
  enabled: true
  mode: dynamic_striping
  max_stripes: 4
  num_physical_links: 4
  applies_to_links: [CXL_SWITCH]

resource_capacity:
  host_h2d_ingress_channels: 1
  host_h2d_stage_channels: 1
  host_d2h_channels: 1
  cxl_direct_channels: 1
  host_touch_channels: 1
  cpu_materialize_channels: 1

stage_defaults:
  cpu_units: 32
  cpu_unit_compute_Bps: 1000000000.0
  cpu_unit_power_W: 15.0
  pim_units: 32
  pim_unit_compute_Bps: 1000000000.0
  pim_unit_power_W: 7.5
  host_touch_Bps: 25000000000.0
  host_touch_fixed_s: 0.000002

scenario_stage_device_map_by_template:
  deepvariant_3stage:
    cpu_only: [cpu, cpu, cpu, cpu, cpu]
    pim_host_bounce: [cpu, pim, pim, pim, cpu]
    pim_flowcxl_direct: [cpu, pim, pim, pim, cpu]
  tpch_3op:
    cpu_only: [cpu, cpu, cpu]
    pim_host_bounce: [pim, pim, pim]
    pim_flowcxl_direct: [pim, pim, pim]

pim_speedup_vs_cpu_by_stage_by_template:
  deepvariant_3stage:
    make_examples_frontend: 1.0
    make_examples_tensorize: 1.6
    call_variants_infer: 2.0
    call_variants_post: 1.4
    postprocess_variants: 1.0
  tpch_3op:
    scan_filter_project: 2.5
    join: 3.0
    groupby_agg: 2.0

cpu_stage_unit_compute_Bps_by_template:
  deepvariant_3stage:
    make_examples_frontend: 1000000000.0
    make_examples_tensorize: 1000000000.0
    call_variants_infer: 1000000000.0
    call_variants_post: 1000000000.0
    postprocess_variants: 1000000000.0
  tpch_3op:
    scan_filter_project: 1200000000.0
    join: 900000000.0
    groupby_agg: 1500000000.0

bytes_touched_factors_by_stage_by_template:
  deepvariant_3stage:
    make_examples_frontend:
      input_factor: 1.0
      output_factor: 1.0
      amplification_factor: 1.0
    make_examples_tensorize:
      input_factor: 1.0
      output_factor: 1.0
      amplification_factor: 1.0
    call_variants_infer:
      input_factor: 1.0
      output_factor: 1.0
      amplification_factor: 1.0
    call_variants_post:
      input_factor: 1.0
      output_factor: 1.0
      amplification_factor: 1.0
    postprocess_variants:
      input_factor: 1.0
      output_factor: 1.0
      amplification_factor: 1.0
  tpch_3op:
    scan_filter_project:
      input_factor: 4.5
      output_factor: 1.0
      amplification_factor: 1.0
    join:
      input_factor: 1.0
      output_factor: 1.0
      amplification_factor: 1.6
    groupby_agg:
      input_factor: 1.0
      output_factor: 1.0
      amplification_factor: 1.0

memory_system_by_template:
  deepvariant_3stage:
    enabled: false
    cpu_baseline_system:
      baseline_engine: vectorized_pipeline
    pim_system:
      enabled: false
  tpch_3op:
    enabled: true
    cpu_baseline_system:
      baseline_engine: vectorized_pipeline
      dram_channels: 8
      banks_per_channel: 16
      cacheline_bytes: 64
      queueing_model: utilization_penalty
      queue_alpha: 0.35
      rho_cap: 0.95
      stages:
        scan_filter_project:
          access_pattern: sequential_scan
          row_hit_rate: 0.92
          mlp: 32
          avg_miss_latency_ns: 95.0
          peak_bw_Bps: 120000000000.0
          penalty_multiplier: 1.0
        join:
          access_pattern: hash_probe
          row_hit_rate: 0.18
          mlp: 8
          avg_miss_latency_ns: 130.0
          peak_bw_Bps: 120000000000.0
          penalty_multiplier: 3.0
        groupby_agg:
          access_pattern: groupby_update
          row_hit_rate: 0.28
          mlp: 10
          avg_miss_latency_ns: 125.0
          peak_bw_Bps: 120000000000.0
          penalty_multiplier: 2.0
      materialization_policy:
        boundaries_by_engine:
          vectorized_pipeline: []
          blocking_volcano: [1, 2]
        materialize_Bps: 80000000000.0
        fixed_s: 0.000002
        scenarios: [cpu_only]
    pim_system:
      enabled: true
      dram_channels: 16
      banks_per_channel: 16
      cacheline_bytes: 64
      queueing_model: utilization_penalty
      queue_alpha: 0.20
      rho_cap: 0.95
      stages:
        scan_filter_project:
          access_pattern: sequential_scan
          row_hit_rate: 0.95
          mlp: 64
          avg_miss_latency_ns: 80.0
          peak_bw_Bps: 240000000000.0
        join:
          access_pattern: hash_probe
          row_hit_rate: 0.70
          mlp: 32
          avg_miss_latency_ns: 100.0
          peak_bw_Bps: 240000000000.0
        groupby_agg:
          access_pattern: groupby_update
          row_hit_rate: 0.70
          mlp: 32
          avg_miss_latency_ns: 100.0
          peak_bw_Bps: 240000000000.0

tiling_model_by_template:
  deepvariant_3stage:
    enabled: false
    admission_refill_policy: stage0_output
    glue_resource_mode: shared_consumer_compute
    stage_kernel_class:
      make_examples_frontend: STREAM_SIMD
      make_examples_tensorize: PACK_TENSORIZE
      call_variants_infer: CNN_INFER
      call_variants_post: BATCHIFY
      postprocess_variants: POSTPROC
    kernel_tiling_policy_by_class:
      STREAM_SIMD:
        target_tile_bytes: 268435456
      PACK_TENSORIZE:
        target_tile_bytes: 134217728
      BATCHIFY:
        target_tile_bytes: 67108864
      CNN_INFER:
        target_tile_bytes: 67108864
      POSTPROC:
        target_tile_bytes: 134217728
    boundary_mappings:
      "make_examples_frontend->make_examples_tensorize":
        mapping_id: dv_frontend_to_tensorize_identity_v1
        mapping_type: IDENTITY
      "make_examples_tensorize->call_variants_infer":
        mapping_id: dv_tensorize_infer_batchify_v1
        mapping_type: GROUP_K_TO_1
        group_k: 4
        glue_type: GLUE_COPY
        glue_device: pim
        glue_fixed_s: 0.0000002
        glue_compute_Bps: 80000000000.0
        glue_mem_Bps: 200000000000.0
        glue_transfer_path: none
      "call_variants_infer->call_variants_post":
        mapping_id: dv_infer_post_batchify_v1
        mapping_type: GROUP_K_TO_1
        group_k: 2
        glue_type: GLUE_COPY
        glue_device: pim
        glue_fixed_s: 0.0000002
        glue_compute_Bps: 80000000000.0
        glue_mem_Bps: 200000000000.0
        glue_transfer_path: none
      "call_variants_post->postprocess_variants":
        mapping_id: dv_post_to_postprocess_identity_v1
        mapping_type: IDENTITY
  tpch_3op:
    enabled: false
    admission_refill_policy: stage0_output
    glue_resource_mode: shared_consumer_compute
    stage_kernel_class:
      scan_filter_project: STREAM_SIMD
      join: HASH_JOIN_PROBE
      groupby_agg: REDUCE_PARTIAL
    kernel_tiling_policy_by_class:
      STREAM_SIMD:
        target_tile_bytes: 268435456
      HASH_JOIN_PROBE:
        target_tile_bytes: 134217728
      REDUCE_PARTIAL:
        target_tile_bytes: 134217728
      HASH_SHUFFLE:
        target_tile_bytes: 67108864
      REDUCE_FINAL:
        target_tile_bytes: 67108864
    boundary_mappings:
      "scan_filter_project->join":
        mapping_id: tpch_join_shuffle_v1
        mapping_type: REPARTITION_HASH
        partitions: pim_units
        glue_type: GLUE_SHUFFLE
        glue_device: pim
        glue_fixed_s: 0.0000004
        glue_compute_Bps: 60000000000.0
        glue_mem_Bps: 180000000000.0
        glue_transfer_path: none
        output_amplification: 1.0
      "join->groupby_agg":
        mapping_id: tpch_groupby_reduce_v1
        mapping_type: GROUP_K_TO_1
        group_k: 4
        glue_type: GLUE_REDUCE
        glue_device: pim
        glue_fixed_s: 0.0000002
        glue_compute_Bps: 70000000000.0
        glue_mem_Bps: 200000000000.0
        glue_transfer_path: none

pim_mode_by_stage_by_template:
  deepvariant_3stage:
    make_examples_frontend: NONE
    make_examples_tensorize: BANK
    call_variants_infer: BANK
    call_variants_post: BANK_GROUP
    postprocess_variants: NONE
  tpch_3op:
    scan_filter_project: BANK
    join: BANK_GROUP
    groupby_agg: BANK_GROUP

pim_mode_effects:
  NONE:
    compute_multiplier: 1.0
    mem_multiplier: 1.0
    command_overhead_s: 0.0
  BANK:
    compute_multiplier: 1.0
    mem_multiplier: 1.0
    command_overhead_s: 0.0
  BANK_GROUP:
    compute_multiplier: 0.8
    mem_multiplier: 0.85
    command_overhead_s: 0.0000001
  BUFFER:
    compute_multiplier: 0.6
    mem_multiplier: 0.65
    command_overhead_s: 0.0000002

transfer_power_W:
  host_h2d_ingress_channel: 20.0
  host_h2d_stage_channel: 20.0
  host_d2h_channel: 20.0
  cxl_direct_channel: 16.0
  host_touch_channel: 30.0
  cpu_materialize_channel: 22.0

stage_overrides: {}

validation:
  system_id: system_x_2026q1
  calibration:
    enabled: true
    input_mode: measured_csv
    measured_inputs:
      host_h2d: tools/validation/sample_inputs/system_x_2026q1/host_h2d.csv
      host_d2h: tools/validation/sample_inputs/system_x_2026q1/host_d2h.csv
      bounce: tools/validation/sample_inputs/system_x_2026q1/bounce.csv
      direct: tools/validation/sample_inputs/system_x_2026q1/direct.csv
      host_touch: tools/validation/sample_inputs/system_x_2026q1/host_touch.csv
    required_paths: [host_h2d, host_d2h, bounce]
    optional_paths: [direct]
    required_points_min_samples: 5
    coverage_policy:
      warn_on_low_samples: true
      fail_on_missing_required_point: true
    memory_mode_policy:
      required_paths_must_be_pinned: true
      allow_mixed_memory_mode: false
      pinned_column: pinned
    host_touch_sanity:
      enabled: true
      expected_bandwidth_Bps: null
      ratio_min: 0.2
      ratio_max: 2.0
      on_fail: warn
      on_missing_reference: warn
    negative_residual_policy:
      mode: clamp_to_zero
      epsilon_s: 1.0e-9
    crosscheck_policy:
      pass_mape_max: 0.20
      pass_points_min: 5
    direct_provenance_policy:
      allow_crosscheck_only: true
      allow_cited_sweep_only: true
      cited_latency_ns_range: [214, 394]
      cited_bandwidth_GBps_range: [18, 52]
      cited_switch_latency_ns: 600
      cited_switch_hop_latency_ns_sweep: [50, 150, 300]
      cited_switch_bottleneck_factor_sweep: [0.5, 0.75, 1.0]
    payload_bytes: [4194304, 33554432, 268435456]
    concurrency_levels: [1, 2, 4, 8]
    repetitions: 10
    paths: [host_h2d, host_d2h, bounce, direct]
    fit_model: latency_plus_bytes_over_bw
    fit_reference_concurrency: 1
    aggregate_stat: median
    fit_payload_min_bytes: 4194304
    fit_payload_max_bytes: 268435456
    ceiling_check:
      enabled: true
      pcie_gen: 4
      lane_width: 16
      max_one_way_utilization_fraction: 0.95
      fail_on_violation: false
  crosscheck:
    enabled: true
    reference_model: processor_share
    tolerance_mape_percent: 5.0
  sensitivity:
    enabled: true
    families: [cxl_link, pim_speedup, tpch_memory, glue_fixed_cost, glue_roofline_factor, pim_mode_effects_scale, energy]
  energy:
    mode: relative_sweep
    power_scale_factors: [0.7, 1.0, 1.3]
